<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JES — Aggiornamento in arrivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      padding: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.2rem;
    }
    .header img {
      height: 52px;
      object-fit: contain;
    }
    .header span {
      font-size: 2.2rem;
      font-weight: 900;
      color: #ff6a00;
    }

    h1 {
      font-size: clamp(1.15rem, 5vw, 1.8rem);
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 0.6rem;
      padding: 0 0.5rem;
    }
    h1 .jes { color: #ff6a00; }

    .sub {
      font-size: 0.75rem;
      color: #bbb;
      text-align: center;
      margin-bottom: 2.2rem;
    }

    /* Countdown box */
    .countdown-wrap {
      border: 2px solid #ff6a00;
      border-radius: 16px;
      padding: 1.4rem 1.8rem;
      display: flex;
      gap: 0;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 340px;
    }

    .cd-block {
      text-align: center;
      flex: 1;
    }
    .cd-num {
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      font-weight: 900;
      color: #ff6a00;
      line-height: 1;
      display: block;
    }
    .cd-label {
      font-size: 0.6rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 5px;
      display: block;
    }
    .cd-sep {
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      font-weight: 900;
      color: #e0e0e0;
      padding: 0 2px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    footer {
      margin-top: 2.5rem;
      color: #ddd;
      font-size: 0.65rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://i.postimg.cc/mkjzyMwV/Logo.png" alt="JES" />
    <span>JES</span>
  </div>

  <h1>Sta arrivando un aggiornamento<br>importante su <span class="jes">JES</span></h1>
  <p class="sub">Aspetta i prossimi giorni per vederla</p>

  <div class="countdown-wrap">
    <div class="cd-block">
      <span class="cd-num" id="days">00</span>
      <span class="cd-label">Giorni</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-num" id="hours">00</span>
      <span class="cd-label">Ore</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-num" id="minutes">00</span>
      <span class="cd-label">Minuti</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-num" id="seconds">00</span>
      <span class="cd-label">Secondi</span>
    </div>
  </div>

  <footer>© 2026 JES — Tutti i diritti riservati</footer>

  <script>
    function setTargetDate() {
      const target = new Date();
      // Aggiunge esattamente 1 giorno (24 ore) alla data corrente
      target.setDate(target.getDate() + 1);
      return target;
    }

    const target = setTargetDate();

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = target - new Date();
      if (diff <= 0) {
        ['days','hours','minutes','seconds'].forEach(id => {
          document.getElementById(id).textContent = '00';
        });
        return;
      }
      
      document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
      document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
      document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
      document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
